services:
  postgres:
    image: pgvector/pgvector:pg17-trixie
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  ethelflow:
    build:
      context: .
      dockerfile: ethelflow.Dockerfile
    image: ethelflow:latest
    command: ["python", "-m", "ethelflow"]
    env_file: .env
    environment:
      ETHELFLOW_MODEL_CATALOG_PATH: /etc/ethelflow/catalog.yaml

      ETHELFLOW_S3_ENDPOINT_URL: http://minio:9000
      ETHELFLOW_S3_ACCESS_KEY: minio
      ETHELFLOW_S3_SECRET_KEY: minio123
      ETHELFLOW_S3_BUCKET_NAME: ethel

      ETHELFLOW_POSTGRES_HOST: postgres
      ETHELFLOW_POSTGRES_PORT: "5432"
      ETHELFLOW_POSTGRES_DB: appdb
      ETHELFLOW_POSTGRES_USER: postgres
      ETHELFLOW_POSTGRES_PASSWORD: strongpassword

      INTENT_URL: http://intent:8000/intent
      EMBEDDING_URL: http://embedding:8000/embedding
      SEARCH_VECTORS_URL: http://search-vectors:8000/search_vectors
      RETRIEVE_CHUNKS_URL: http://retrieve-chunks:8000/retrieve_chunks
      COMPLETE_TEMPLATE_URL: http://complete-template:8000/complete_template
      REASONING_URL: http://reasoning:8000/reasoning

      FILE_TO_TEXT_URL: http://file-to-text:8000/file_to_text
      CHUNK_TEXT_URL: http://chunk-text:8000/chunk_text
      STORE_TEXT_URL: http://store-text:8000/store_text
      STORE_CHUNKS_URL: http://store-chunks:8000/store_chunks
      STORE_VECTORS_URL: http://store-vectors:8000/store_vectors
    volumes:
      - ./:/app
      - ./local_config:/etc/ethelflow:ro
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - minio
      - complete-template
      - reasoning
      - embedding
      - search-vectors
      - retrieve-chunks
      - intent

  reasoning:
    build:
      context: .
      dockerfile: ethelflow.Dockerfile
    image: ethelflow:latest
    command: ["python", "-m", "ethelflow.agents.reasoning"]
    env_file: .env
    environment:
      ETHELFLOW_INFERENCE_CLASS: reasoning
      ETHELFLOW_MODEL_CATALOG_PATH: /etc/ethelflow/catalog.yaml
      ETHELFLOW_S3_ENDPOINT_URL: http://minio:9000
      ETHELFLOW_S3_ACCESS_KEY: minio
      ETHELFLOW_S3_SECRET_KEY: minio123
      ETHELFLOW_S3_BUCKET_NAME: ethel
    volumes:
      - ./:/app
      - ./local_config:/etc/ethelflow:ro
    depends_on:
      - minio

  embedding:
    build:
      context: .
      dockerfile: ethelflow.Dockerfile
    image: ethelflow:latest
    command: ["python", "-m", "ethelflow.agents.embedding"]
    env_file: .env
    environment:
      ETHELFLOW_MODEL_CATALOG_PATH: /etc/ethelflow/catalog.yaml
      ETHELFLOW_DEFAULT_EMBEDDING_SPACE: ada3_large
    volumes:
      - ./:/app
      - ./local_config:/etc/ethelflow:ro

  search-vectors:
    build:
      context: .
      dockerfile: ethelflow.Dockerfile
    image: ethelflow:latest
    command: ["python", "-m", "ethelflow.agents.search_vectors"]
    environment:
      ETHELFLOW_MODEL_CATALOG_PATH: /etc/ethelflow/catalog.yaml
      ETHELFLOW_POSTGRES_HOST: postgres
      ETHELFLOW_POSTGRES_PORT: "5432"
      ETHELFLOW_POSTGRES_DB: appdb
      ETHELFLOW_POSTGRES_USER: postgres
      ETHELFLOW_POSTGRES_PASSWORD: strongpassword
    volumes:
      - ./local_config:/etc/ethelflow:ro
    depends_on:
      - postgres

  retrieve-chunks:
    build:
      context: .
      dockerfile: ethelflow.Dockerfile
    image: ethelflow:latest
    command: ["python", "-m", "ethelflow.agents.retrieve_chunks"]
    environment:
      ETHELFLOW_POSTGRES_HOST: postgres
      ETHELFLOW_POSTGRES_PORT: "5432"
      ETHELFLOW_POSTGRES_DB: appdb
      ETHELFLOW_POSTGRES_USER: postgres
      ETHELFLOW_POSTGRES_PASSWORD: strongpassword
    depends_on:
      - postgres

  complete-template:
    build:
      context: .
      dockerfile: ethelflow.Dockerfile
    image: ethelflow:latest
    command: ["python", "-m", "ethelflow.agents.complete_template"]

  intent:
    build:
      context: .
      dockerfile: ethelflow.Dockerfile
    image: ethelflow:latest
    command: ["python", "-m", "ethelflow.agents.intent"]
    env_file: .env
    environment:
      ETHELFLOW_MODEL_CATALOG_PATH: /etc/ethelflow/catalog.yaml
      ETHELFLOW_INFERENCE_CLASS: low_latency
      OPENAI_LOG: debug
    volumes:
      - ./:/app
      - ./local_config:/etc/ethelflow:ro

  file-to-text:
    build:
      context: .
      dockerfile: ethelflow.Dockerfile
    image: ethelflow:latest
    command: ["python", "-m", "ethelflow.agents.file_to_text"]
    env_file: .env
    environment:
      ETHELFLOW_S3_ENDPOINT_URL: http://minio:9000
      ETHELFLOW_S3_ACCESS_KEY: minio
      ETHELFLOW_S3_SECRET_KEY: minio123
      ETHELFLOW_S3_BUCKET_NAME: ethel
      ETHELFLOW_POSTGRES_HOST: postgres
      ETHELFLOW_POSTGRES_PORT: "5432"
      ETHELFLOW_POSTGRES_DB: appdb
      ETHELFLOW_POSTGRES_USER: postgres
      ETHELFLOW_POSTGRES_PASSWORD: strongpassword
    volumes:
      - ./:/app
      - ./local_config:/etc/ethelflow:ro
    depends_on:
      - postgres
      - minio

  chunk-text:
    build:
      context: .
      dockerfile: ethelflow.Dockerfile
    image: ethelflow:latest
    command: ["python", "-m", "ethelflow.agents.chunk_text"]
    env_file: .env
    volumes:
      - ./:/app
      - ./local_config:/etc/ethelflow:ro

  store-text:
    build:
      context: .
      dockerfile: ethelflow.Dockerfile
    image: ethelflow:latest
    command: ["python", "-m", "ethelflow.agents.store_text"]
    env_file: .env
    environment:
      ETHELFLOW_POSTGRES_HOST: postgres
      ETHELFLOW_POSTGRES_PORT: "5432"
      ETHELFLOW_POSTGRES_DB: appdb
      ETHELFLOW_POSTGRES_USER: postgres
      ETHELFLOW_POSTGRES_PASSWORD: strongpassword
    volumes:
      - ./:/app
      - ./local_config:/etc/ethelflow:ro
    depends_on:
      - postgres

  store-chunks:
    build:
      context: .
      dockerfile: ethelflow.Dockerfile
    image: ethelflow:latest
    command: ["python", "-m", "ethelflow.agents.store_chunks"]
    env_file: .env
    environment:
      ETHELFLOW_POSTGRES_HOST: postgres
      ETHELFLOW_POSTGRES_PORT: "5432"
      ETHELFLOW_POSTGRES_DB: appdb
      ETHELFLOW_POSTGRES_USER: postgres
      ETHELFLOW_POSTGRES_PASSWORD: strongpassword
    volumes:
      - ./:/app
      - ./local_config:/etc/ethelflow:ro
    depends_on:
      - postgres

  store-vectors:
    build:
      context: .
      dockerfile: ethelflow.Dockerfile
    image: ethelflow:latest
    command: ["python", "-m", "ethelflow.agents.store_vectors"]
    env_file: .env
    environment:
      ETHELFLOW_MODEL_CATALOG_PATH: /etc/ethelflow/catalog.yaml
      ETHELFLOW_POSTGRES_HOST: postgres
      ETHELFLOW_POSTGRES_PORT: "5432"
      ETHELFLOW_POSTGRES_DB: appdb
      ETHELFLOW_POSTGRES_USER: postgres
      ETHELFLOW_POSTGRES_PASSWORD: strongpassword
    volumes:
      - ./:/app
      - ./local_config:/etc/ethelflow:ro
    depends_on:
      - postgres

volumes:
  pgdata:
  miniodata:
