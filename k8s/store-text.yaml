apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-text
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-text
  template:
    metadata:
      labels:
        app: store-text
    spec:
      containers:
        - name: store-text
          image: ethelflow:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "ethelflow.agents.store_text"]
          env:
            - name: ETHELFLOW_POSTGRES_HOST
              value: postgres
            - name: ETHELFLOW_POSTGRES_PORT
              value: "5432"
            - name: ETHELFLOW_POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: ETHELFLOW_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: ETHELFLOW_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: store-text
spec:
  selector:
    app: store-text
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

