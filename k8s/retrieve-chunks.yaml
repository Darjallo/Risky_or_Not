apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieve-chunks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retrieve-chunks
  template:
    metadata:
      labels:
        app: retrieve-chunks
    spec:
      containers:
        - name: retrieve-chunks
          image: ethelflow:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "ethelflow.agents.retrieve_chunks"]
          env:
            # Postgres connection (retrieve-chunks reads chunks)
            - name: ETHELFLOW_POSTGRES_HOST
              value: postgres
            - name: ETHELFLOW_POSTGRES_PORT
              value: "5432"
            - name: ETHELFLOW_POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: ETHELFLOW_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: ETHELFLOW_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: retrieve-chunks
spec:
  selector:
    app: retrieve-chunks
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

