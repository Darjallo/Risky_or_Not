apiVersion: apps/v1
kind: Deployment
metadata:
  name: reasoning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reasoning
  template:
    metadata:
      labels:
        app: reasoning
    spec:
      containers:
        - name: reasoning
          image: ethelflow:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "ethelflow.agents.reasoning"]
          env:
            - name: ETHELFLOW_INFERENCE_CLASS
              value: reasoning

            - name: ETHELFLOW_MODEL_CATALOG_PATH
              value: /etc/ethelflow/catalog.yaml

            # Provider API key for provider "ethz_azure_openai"
            - name: ETHELFLOW_PROVIDER_ETHZ_AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ethz-azure-openai-secrets
                  key: api_key

            # (your reasoning service also needs S3)
            - name: ETHELFLOW_S3_ENDPOINT_URL
              value: http://minio:9000
            - name: ETHELFLOW_S3_ACCESS_KEY
              value: minio
            - name: ETHELFLOW_S3_SECRET_KEY
              value: minio123
            - name: ETHELFLOW_S3_BUCKET_NAME
              value: ethel

          volumeMounts:
            - name: model-catalog
              mountPath: /etc/ethelflow
              readOnly: true

      volumes:
        - name: model-catalog
          configMap:
            name: ethelflow-model-catalog
            items:
              - key: catalog.yaml
                path: catalog.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: reasoning
spec:
  selector:
    app: reasoning
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

