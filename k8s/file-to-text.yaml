apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-to-text
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-to-text
  template:
    metadata:
      labels:
        app: file-to-text
    spec:
      containers:
        - name: file-to-text
          image: ethelflow:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "ethelflow.agents.file_to_text"]
          env:
            - name: ETHELFLOW_S3_ENDPOINT_URL
              value: http://minio:9000
            - name: ETHELFLOW_S3_ACCESS_KEY
              value: minio
            - name: ETHELFLOW_S3_SECRET_KEY
              value: minio123
            - name: ETHELFLOW_S3_BUCKET_NAME
              value: ethel
            - name: ETHELFLOW_POSTGRES_HOST
              value: postgres
            - name: ETHELFLOW_POSTGRES_PORT
              value: "5432"
            - name: ETHELFLOW_POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: ETHELFLOW_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: ETHELFLOW_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: file-to-text
spec:
  selector:
    app: file-to-text
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
