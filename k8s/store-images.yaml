apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-images
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-images
  template:
    metadata:
      labels:
        app: store-images
    spec:
      containers:
        - name: store-images
          image: ethelflow:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "ethelflow.agents.store_images"]
          ports:
            - containerPort: 8000
          env:
            # S3 (match file-to-text)
            - name: ETHELFLOW_S3_ENDPOINT_URL
              value: http://minio:9000
            - name: ETHELFLOW_S3_ACCESS_KEY
              value: minio
            - name: ETHELFLOW_S3_SECRET_KEY
              value: minio123
            - name: ETHELFLOW_S3_BUCKET_NAME
              value: ethel

            # Postgres (match store-text)
            - name: ETHELFLOW_POSTGRES_HOST
              value: postgres
            - name: ETHELFLOW_POSTGRES_PORT
              value: "5432"
            - name: ETHELFLOW_POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: ETHELFLOW_POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: ETHELFLOW_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: store-images
spec:
  selector:
    app: store-images
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP

